<!DOCTYPE html>
<html lang="en" data-theme="general" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sheba+ | Digital Healthcare Supply Chain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --bg:#FAFAF7;
  --ink:#14171F;
  --muted:#5B6270;
  --line:rgba(20,23,31,.10);
  --card:#FFFFFF;
  --card-2:#F3F2EC;
  --radius:20px;
  --shadow:0 1px 2px rgba(20,23,31,.04), 0 12px 32px -16px rgba(20,23,31,.18);
  --font-display:'Fraunces', serif;
  --font-body:'Manrope', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
  --nav-h:78px;
}
html[data-theme="general"]{ --g1:#0F766E; --g2:#14B8A6; --accent:#0F766E; --accent-soft:#E4F5F2; }
html[data-theme="diabetes"]{ --g1:#B45309; --g2:#FBBF24; --accent:#B45309; --accent-soft:#FDF1DA; }
html[data-theme="heart"]{ --g1:#BE123C; --g2:#FB7185; --accent:#BE123C; --accent-soft:#FCE4E9; }
html[data-theme="children"]{ --g1:#15803D; --g2:#84CC16; --accent:#15803D; --accent-soft:#E4F4E0; }
html[data-theme="elderly"]{ --g1:#0369A1; --g2:#38BDF8; --accent:#0369A1; --accent-soft:#E1F1FB; }
html[data-theme="maternity"]{ --g1:#6D28D9; --g2:#D946EF; --accent:#6D28D9; --accent-soft:#EFE3FC; }

*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg); color:var(--ink); font-family:var(--font-body);
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
  padding-bottom:calc(var(--nav-h) + 10px);
  transition:background .4s ease;
}
html[data-lang="bn"] body{ font-family:'Hind Siliguri', var(--font-body); }
img,svg{display:block;}
a{color:inherit; text-decoration:none;}
.wrap{max-width:560px; margin:0 auto; padding:0 20px; position:relative;}
h1,h2,h3{font-family:var(--font-display); font-weight:600; letter-spacing:-.01em;}
html[data-lang="bn"] h1, html[data-lang="bn"] h2, html[data-lang="bn"] h3{ font-family:'Hind Siliguri', var(--font-display); font-weight:700; }
.mono{font-family:var(--font-mono);}
.reveal{opacity:0; transform:translateY(18px); transition:opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1);}
.reveal.in{opacity:1; transform:translateY(0);}
[data-i18n]{transition:opacity .25s ease;}

/* ============ HEADER ============ */
.topbar{
  position:sticky; top:0; z-index:40; backdrop-filter:blur(14px);
  background:rgba(250,250,247,.82); border-bottom:1px solid var(--line);
}
.topbar-inner{display:flex; align-items:center; justify-content:space-between; padding:14px 20px; max-width:560px; margin:0 auto;}
.brand{display:flex; align-items:center; gap:9px;}
.brand-mark{
  width:34px; height:34px; border-radius:10px;
  background:linear-gradient(135deg,var(--g1),var(--g2));
  display:flex; align-items:center; justify-content:center;
  transition:background .5s ease;
}
.brand-mark svg{width:18px; height:18px; stroke:#fff;}
.brand-name{font-family:var(--font-display); font-weight:700; font-size:18px;}
.brand-name sup{font-size:11px; color:var(--accent); transition:color .5s ease;}
.top-actions{display:flex; align-items:center; gap:8px;}
.lang-btn{
  font-family:var(--font-mono); font-size:11.5px; font-weight:600; letter-spacing:.03em;
  border:1px solid var(--line); background:var(--card); color:var(--ink);
  border-radius:100px; padding:8px 12px; cursor:pointer; display:flex; align-items:center; gap:6px;
  transition:border-color .2s ease;
}
.lang-btn:active{transform:scale(.96);}

/* ============ HERO ============ */
.hero{position:relative; padding:34px 0 8px; overflow:hidden;}
.hero-blob{
  position:absolute; top:-120px; right:-90px; width:320px; height:320px; border-radius:50%;
  background:linear-gradient(135deg,var(--g1),var(--g2)); opacity:.16; filter:blur(10px);
  animation:float 9s ease-in-out infinite; transition:background 1s ease;
}
@keyframes float{0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-14px,18px) scale(1.06);}}
.eyebrow{
  display:inline-flex; align-items:center; gap:7px; font-family:var(--font-mono); font-size:11px;
  letter-spacing:.08em; color:var(--accent); background:var(--accent-soft); padding:6px 12px;
  border-radius:100px; font-weight:600; transition:color .5s ease, background .5s ease;
}
.eyebrow .dot{width:6px; height:6px; border-radius:50%; background:var(--accent); transition:background .5s ease; animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.3;}}
.hero h1{font-size:34px; line-height:1.08; margin-top:16px; max-width:420px;}
.hero .grad-text{
  background:linear-gradient(135deg,var(--g1),var(--g2)); -webkit-background-clip:text; background-clip:text; color:transparent;
  transition:background 1.5s ease;
}
.hero p{color:var(--muted); font-size:15px; line-height:1.6; margin-top:14px; max-width:420px;}
.stat-row{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:22px;}
.stat{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px 6px; text-align:center;}
.stat b{display:block; font-family:var(--font-mono); font-size:16px; color:var(--accent); transition:color .5s ease;}
.stat span{font-size:9.5px; color:var(--muted); line-height:1.3; display:block; margin-top:2px;}

/* theme picker - signature element */
.theme-picker{margin-top:28px;}
.theme-picker h3{font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:700; font-family:var(--font-body);}
html[data-lang="bn"] .theme-picker h3{font-family:'Hind Siliguri';}
.theme-picker p.hint{font-size:12.5px; color:var(--muted); margin-top:4px;}
.chip-row{display:flex; gap:8px; overflow-x:auto; padding:14px 2px 4px; scrollbar-width:none;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:6px;
  padding:10px 14px; border-radius:16px; border:1px solid var(--line); background:var(--card);
  cursor:pointer; font-size:11.5px; font-weight:600; color:var(--muted); min-width:74px;
  transition:all .25s ease;
}
.chip .emoji{font-size:20px;}
.chip.active{
  border-color:transparent; color:#fff;
  background:linear-gradient(135deg,var(--g1),var(--g2));
  box-shadow:0 8px 18px -8px var(--g1); transform:translateY(-2px);
}

/* ============ SECTION FRAME ============ */
section{padding:52px 0 0;}
.sec-head{margin-bottom:22px;}
.sec-num{font-family:var(--font-mono); font-size:11px; color:var(--accent); font-weight:700; transition:color .5s ease;}
.sec-title{font-size:24px; margin-top:6px;}
.sec-sub{color:var(--muted); font-size:14px; margin-top:6px; line-height:1.55;}

/* ============ CARDS / GRID ============ */
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow);}
.grid-2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.node-card{
  background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px 12px;
  display:flex; flex-direction:column; gap:8px; transition:transform .25s ease, border-color .25s ease;
}
.node-card:active{transform:scale(.97);}
.node-ic{
  width:36px; height:36px; border-radius:10px; background:var(--accent-soft); display:flex; align-items:center; justify-content:center;
  transition:background .5s ease;
}
.node-ic svg{width:18px; height:18px; stroke:var(--accent); transition:stroke .5s ease;}
.node-card b{font-size:13px; font-weight:700;}
.node-card span{font-size:11.5px; color:var(--muted); line-height:1.4;}

/* ============ DISTRIBUTION FLOW ============ */
.flow{position:relative; padding:8px 0 8px 34px;}
.flow::before{
  content:''; position:absolute; left:11px; top:6px; bottom:6px; width:2px;
  background:linear-gradient(var(--g1),var(--g2)); border-radius:2px; transition:background .5s ease;
}
.flow-step{position:relative; padding-bottom:26px;}
.flow-step:last-child{padding-bottom:0;}
.flow-dot{
  position:absolute; left:-34px; top:2px; width:24px; height:24px; border-radius:50%;
  background:var(--card); border:2px solid var(--accent); display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--accent); transition:border-color .5s ease, color .5s ease;
}
.flow-step b{font-size:14.5px; display:block;}
.flow-step span{font-size:12px; color:var(--muted);}
.pulse-rider{
  position:absolute; left:-30px; width:16px; height:16px; border-radius:50%;
  background:linear-gradient(135deg,var(--g1),var(--g2)); box-shadow:0 0 0 4px var(--accent-soft);
  animation:ride 5s ease-in-out infinite;
}
@keyframes ride{0%{top:2px;} 100%{top:calc(100% - 20px);}}
.flow-note{
  margin-top:16px; background:var(--accent-soft); border-radius:14px; padding:12px 14px; font-size:12.5px;
  color:var(--ink); transition:background .5s ease; display:flex; gap:8px; align-items:flex-start;
}

/* ============ CHANNEL PILLS ============ */
.pill-grid{display:flex; flex-wrap:wrap; gap:8px;}
.pill{
  border:1px solid var(--line); background:var(--card); border-radius:100px; padding:9px 13px; font-size:12.5px;
  font-weight:600; display:flex; align-items:center; gap:6px; transition:transform .2s ease;
}
.pill:hover{transform:translateY(-2px);}
.pill .dot2{width:6px; height:6px; border-radius:50%; background:var(--accent); transition:background .5s ease;}

/* ============ STEPPER ============ */
.stepper{display:flex; flex-direction:column; gap:0;}
.step{display:flex; gap:14px; position:relative; padding-bottom:20px;}
.step:last-child{padding-bottom:0;}
.step::before{
  content:''; position:absolute; left:15px; top:34px; bottom:0; width:1.5px; background:var(--line);
}
.step:last-child::before{display:none;}
.step-num{
  flex:0 0 32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--g1),var(--g2));
  color:#fff; font-family:var(--font-mono); font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center;
  transition:background .5s ease; z-index:1;
}
.step-body b{font-size:13.5px; display:block; margin-bottom:2px;}
.step-body span{font-size:12px; color:var(--muted); line-height:1.5;}

/* ============ DELIVERY TYPES ============ */
.deliv-scroll{display:flex; gap:10px; overflow-x:auto; padding:4px 2px 10px; scrollbar-width:none;}
.deliv-scroll::-webkit-scrollbar{display:none;}
.deliv-card{
  flex:0 0 148px; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px;
}
.deliv-time{font-family:var(--font-mono); font-size:18px; font-weight:700; color:var(--accent); transition:color .5s ease;}
.deliv-card b{display:block; font-size:12.5px; margin-top:6px;}
.deliv-card span{font-size:11px; color:var(--muted);}

/* ============ PROFILE / DASHBOARD ============ */
.profile-card{
  background:linear-gradient(150deg,var(--g1),var(--g2)); border-radius:22px; padding:20px; color:#fff;
  position:relative; overflow:hidden; transition:background 1s ease;
}
.profile-card::after{
  content:''; position:absolute; right:-40px; top:-40px; width:150px; height:150px; border-radius:50%;
  background:rgba(255,255,255,.12);
}
.profile-top{display:flex; justify-content:space-between; align-items:flex-start; position:relative;}
.profile-top small{opacity:.8; font-size:11px; letter-spacing:.04em;}
.profile-top .pts{font-family:var(--font-mono); font-size:26px; font-weight:700; margin-top:4px;}
.loy-badge{background:rgba(255,255,255,.2); border-radius:100px; padding:5px 10px; font-size:10.5px; font-weight:700;}
.profile-bar{height:6px; background:rgba(255,255,255,.25); border-radius:100px; margin-top:16px; overflow:hidden;}
.profile-bar i{display:block; height:100%; width:64%; background:#fff; border-radius:100px;}
.profile-foot{display:flex; justify-content:space-between; margin-top:8px; font-size:10.5px; opacity:.85;}

.widget-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px;}
.widget{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px;}
.widget svg{width:16px; height:16px; stroke:var(--accent); transition:stroke .5s ease;}
.widget b{display:block; font-size:12px; margin-top:8px;}
.widget span{font-size:10.5px; color:var(--muted);}

/* KPI dashboard */
.kpi-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.kpi{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px;}
.kpi span.lbl{font-size:10.5px; color:var(--muted); font-weight:600;}
.kpi .val{font-family:var(--font-mono); font-size:19px; font-weight:700; margin-top:4px;}
.spark{display:flex; align-items:flex-end; gap:2px; height:22px; margin-top:8px;}
.spark i{flex:1; background:linear-gradient(180deg,var(--g2),var(--g1)); border-radius:2px 2px 0 0; opacity:.85; transition:background .5s ease;}

/* subscription plans */
.plan-row{display:flex; gap:10px; overflow-x:auto; padding:2px 2px 10px; scrollbar-width:none;}
.plan-row::-webkit-scrollbar{display:none;}
.plan{flex:0 0 128px; text-align:center; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px 8px;}
.plan .emoji{font-size:22px;}
.plan b{display:block; font-size:12px; margin-top:8px;}

/* two column lists */
.two-col{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
.list-col h4{font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:700; margin-bottom:10px;}
.list-col ul{list-style:none;}
.list-col li{font-size:12.5px; padding:7px 0; border-bottom:1px dashed var(--line); display:flex; gap:7px; align-items:flex-start;}
.list-col li::before{content:'—'; color:var(--accent); transition:color .5s ease;}

/* compliance callout */
.callout{
  border:1px solid var(--line); border-left:3px solid var(--accent); background:var(--accent-soft); border-radius:14px;
  padding:16px; transition:background .5s ease, border-color .5s ease;
}
.callout .callout-head{display:flex; gap:8px; align-items:center; font-weight:700; font-size:13px; margin-bottom:6px;}
.callout p{font-size:12.5px; color:var(--ink); line-height:1.6; opacity:.85;}

/* tech chips */
.tech-grid{display:flex; flex-wrap:wrap; gap:7px;}
.tech-chip{font-family:var(--font-mono); font-size:11px; border:1px solid var(--line); border-radius:8px; padding:6px 10px; background:var(--card);}

/* vision closing */
.vision{
  border-radius:24px; padding:26px 22px; margin-top:10px; color:#fff;
  background:linear-gradient(160deg,var(--g1),var(--g2)); position:relative; overflow:hidden;
  transition:background 1s ease;
}
.vision h3{font-size:20px; max-width:320px;}
.vision p{font-size:13px; opacity:.9; margin-top:10px; line-height:1.6; max-width:340px;}
.vision ul{margin-top:14px; padding-left:0; list-style:none; display:flex; flex-direction:column; gap:7px;}
.vision li{font-size:12px; display:flex; gap:8px; align-items:flex-start; opacity:.95;}

.footer{padding:36px 0 10px; text-align:center;}
.footer span{font-size:11px; color:var(--muted); font-family:var(--font-mono);}

/* ============ BOTTOM NAV ============ */
.bottom-nav{
  position:fixed; left:0; right:0; bottom:0; z-index:50; height:var(--nav-h);
  background:rgba(255,255,255,.86); backdrop-filter:blur(18px); border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
.bn-inner{max-width:560px; margin:0 auto; height:64px; display:flex; align-items:center; justify-content:space-around; position:relative;}
.bn-item{
  display:flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none; cursor:pointer;
  color:var(--muted); font-family:var(--font-body); font-size:10px; font-weight:700; padding:6px 10px; border-radius:14px;
  transition:color .25s ease;
}
html[data-lang="bn"] .bn-item{font-family:'Hind Siliguri';}
.bn-item svg{width:21px; height:21px; stroke:var(--muted); transition:stroke .3s ease, transform .3s ease;}
.bn-item.active{color:var(--accent);}
.bn-item.active svg{stroke:var(--accent); transform:translateY(-2px);}
.bn-item.active .bn-dot{opacity:1; transform:scale(1);}
.bn-dot{width:4px; height:4px; border-radius:50%; background:var(--accent); opacity:0; transform:scale(0); transition:all .3s ease; position:absolute; margin-top:26px;}

@media (min-width:601px){
  .hero h1{font-size:40px;}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.5 5 5.5.8-4 3.9.9 5.5L12 14.8 7.1 17.2l.9-5.5-4-3.9L9.5 7z"/></svg></div>
      <div class="brand-name">Sheba<sup>+</sup></div>
    </div>
    <div class="top-actions">
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h7M9 3v2c0 4.5-2.5 8-6 9.5M5 9c1.5 3 4 5 7 6M14 21l4-9 4 9M15.5 18h5"/></svg>
        <span id="langLabel">বাংলা</span>
      </button>
    </div>
  </div>
</header>

<!-- ================= HOME ================= -->
<main>
<section id="home" class="hero">
  <div class="wrap">
    <div class="hero-blob"></div>
    <span class="eyebrow"><span class="dot"></span><span data-i18n="hero.eyebrow"></span></span>
    <h1 data-i18n="hero.title"></h1>
    <p data-i18n="hero.sub"></p>

    <div class="stat-row">
      <div class="stat"><b class="mono" data-count="9">0</b><span data-i18n="stat.potential"></span></div>
      <div class="stat"><b class="mono" data-count="9.5">0</b><span data-i18n="stat.scale"></span></div>
      <div class="stat"><b class="mono" data-count="8.5">0</b><span data-i18n="stat.digital"></span></div>
      <div class="stat"><b class="mono" data-count="9.5">0</b><span data-i18n="stat.fit"></span></div>
    </div>

    <div class="theme-picker">
      <h3 data-i18n="theme.label"></h3>
      <p class="hint" data-i18n="theme.hint"></p>
      <div class="chip-row" id="chipRow">
        <div class="chip active" data-theme="general"><span class="emoji">🩺</span><span data-i18n="cat.general"></span></div>
        <div class="chip" data-theme="diabetes"><span class="emoji">💉</span><span data-i18n="cat.diabetes"></span></div>
        <div class="chip" data-theme="heart"><span class="emoji">❤️</span><span data-i18n="cat.heart"></span></div>
        <div class="chip" data-theme="children"><span class="emoji">🧸</span><span data-i18n="cat.children"></span></div>
        <div class="chip" data-theme="elderly"><span class="emoji">🧓</span><span data-i18n="cat.elderly"></span></div>
        <div class="chip" data-theme="maternity"><span class="emoji">🤰</span><span data-i18n="cat.maternity"></span></div>
      </div>
    </div>
  </div>
</section>

<!-- ================= ECOSYSTEM ================= -->
<section id="ecosystem">
  <div class="wrap">
    <div class="sec-head reveal">
      <span class="sec-num">01</span>
      <h2 class="sec-title" data-i18n="eco.title"></h2>
      <p class="sec-sub" data-i18n="eco.sub"></p>
    </div>
    <div class="grid-2" id="ecoGrid"></div>

    <div class="sec-head reveal" style="margin-top:44px;">
      <span class="sec-num">02</span>
      <h2 class="sec-title" data-i18n="dist.title"></h2>
      <p class="sec-sub" data-i18n="dist.sub"></p>
    </div>
    <div class="card reveal">
      <div class="flow">
        <div class="pulse-rider"></div>
        <div class="flow-step"><div class="flow-dot">1</div><b data-i18n="dist.s1t"></b><span data-i18n="dist.s1d"></span></div>
        <div class="flow-step"><div class="flow-dot">2</div><b data-i18n="dist.s2t"></b><span data-i18n="dist.s2d"></span></div>
        <div class="flow-step"><div class="flow-dot">3</div><b data
